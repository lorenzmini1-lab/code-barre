<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner</title>
  
  <!-- Bibliothèque de scan -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px;
    }

    header {
      text-align: center;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.2rem;
      color: #38bdf8;
    }

    #reader {
      flex: 1;
      width: 100%;
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #334155;
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    .result-card {
      margin-top: 12px;
      background: #1e293b;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #334155;
      text-align: center;
    }

    .label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
    }

    .barcode-val {
      font-family: monospace;
      font-size: 1rem;
      color: #38bdf8;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .country-val {
      font-size: 1.1rem;
      font-weight: bold;
      color: #4ade80;
    }
  </style>
</head>
<body>

  <header>
    <h1>Barcode Scanner</h1>
  </header>

  <div id="reader"></div>

  <div class="result-card">
    <div class="label">Code scanné</div>
    <div id="barcodeOutput" class="barcode-val">-</div>
    
    <div class="label">Pays d'origine</div>
    <div id="countryOutput" class="country-val">-</div>
  </div>

  <script>
    function getCountryFromEAN(code) {
      if (!code || code.length < 3) return "Code invalide";
      const prefix = parseInt(code.substring(0, 3), 10);

      if (prefix >= 0 && prefix <= 139) return "🇺🇸 / 🇨🇦 USA ou Canada";
      if (prefix >= 300 && prefix <= 379) return "🇫🇷 France";
      if (prefix >= 400 && prefix <= 440) return "🇩🇪 Allemagne";
      if (prefix >= 450 && prefix <= 459 || prefix >= 490 && prefix <= 499) return "🇯🇵 Japon";
      if (prefix >= 500 && prefix <= 509) return "🇬🇧 Royaume-Uni";
      if (prefix >= 540 && prefix <= 549) return "🇧🇪 / 🇱🇺 Belgique ou Luxembourg";
      if (prefix >= 570 && prefix <= 579) return "🇩🇰 Danemark";
      if (prefix >= 600 && prefix <= 601) return "🇿🇦 Afrique du Sud";
      if (prefix >= 690 && prefix <= 699) return "🇨🇳 Chine";
      if (prefix >= 700 && prefix <= 709) return "🇳🇴 Norvège";
      if (prefix >= 730 && prefix <= 739) return "🇸🇪 Suède";
      if (prefix >= 760 && prefix <= 769) return "🇨🇭 Suisse";
      if (prefix >= 800 && prefix <= 839) return "🇮🇹 Italie";
      if (prefix >= 840 && prefix <= 849) return "🇪🇸 Espagne";
      if (prefix >= 870 && prefix <= 879) return "🇳🇱 Pays-Bas";
      if (prefix === 885) return "🇹🇭 Thaïlande";
      if (prefix === 888) return "🇸🇬 Singapour";
      if (prefix === 890) return "🇮🇳 Inde";
      if (prefix >= 900 && prefix <= 919) return "🇦🇹 Autriche";
      if (prefix >= 930 && prefix <= 939) return "🇦🇺 Australie";

      return "🌍 Pays inconnu";
    }

    function onScanSuccess(decodedText) {
      document.getElementById("barcodeOutput").textContent = decodedText;
      document.getElementById("countryOutput").textContent = getCountryFromEAN(decodedText);
    }

    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      { fps: 10, qrbox: { width: 250, height: 150 } },
      false
    );

    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
