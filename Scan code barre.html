<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* LE BLINDAGE CSS */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden; /* Empêche le défilement */
      background: #000;
      position: fixed; /* Fixe la position */
      touch-action: none; /* Désactive les gestes tactiles */
      overscroll-behavior: none; /* Désactive le rebond iOS/Android */
    }

    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #reader {
      flex: 1;
      width: 100%;
      position: relative;
    }

    /* Force la vidéo à remplir le conteneur sans déborder */
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    /* Cache tout ce qui n'est pas la vidéo */
    #reader__dashboard_section, #reader__status_span { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div id="reader"></div>
  </div>

  <script>
    // Initialisation forcée
    const scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" }, 
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        alert("Code: " + decodedText);
      }
    ).catch(err => {
      console.log("Erreur : " + err);
    });
  </script>
</body>
</html>
