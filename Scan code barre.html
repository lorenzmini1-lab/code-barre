<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      background: #000;
      position: fixed;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 10px;
    }
    #reader {
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
    }
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
    .results {
      padding: 10px;
      background: #222;
      color: white;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="reader"></div>
    <div class="results" id="result" style="display:none">
      Code: <span id="val">-</span>
    </div>
  </div>
  <script>
    function onScan(text) {
      document.getElementById('result').style.display = 'block';
      document.getElementById('val').textContent = text;
    }
    new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 }, false).render(onScan);
  </script>
</body>
</html>
