<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner</title>
  
  <!-- Manifest pour transformer la page en PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <!-- Library HTML5-QRCode -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 6px;
      color: #38bdf8;
    }

    p {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    #reader {
      width: 100%;
      max-width: 480px;
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #334155;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .result-card {
      width: 100%;
      max-width: 480px;
      margin-top: 20px;
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #334155;
      display: none;
    }

    .result-card.active {
      display: block;
      animation: fadeIn 0.3s ease-in-out;
    }

    .barcode-val {
      font-family: monospace;
      font-size: 1.2rem;
      color: #38bdf8;
      margin-bottom: 8px;
    }

    .country-val {
      font-size: 1.4rem;
      font-weight: bold;
      color: #4ade80;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Barcode Scanner</h1>
    <p>Pointez votre appareil photo vers un code-barres (EAN-13)</p>
  </header>

  <div id="reader"></div>

  <div id="result" class="result-card">
    <p>Scanned Code:</p>
    <div id="barcodeOutput" class="barcode-val">-</div>
    <p>GS1 Registered Country:</p>
    <div id="countryOutput" class="country-val">-</div>
  </div>

  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('Service Worker Registered'))
          .catch((err) => console.error('Service Worker Error:', err));
      });
    }

    // GS1 Prefix Database
    function getCountryFromEAN(code) {
      if (!code || code.length < 3) return "Invalid Code";

      const prefix = parseInt(code.substring(0, 3), 10);

      if (prefix >= 0 && prefix <= 139) return " /  USA or Canada";
      if (prefix >= 300 && prefix <= 379) return " France";
      if (prefix >= 400 && prefix <= 440) return " Germany";
      if (prefix >= 450 && prefix <= 459 || prefix >= 490 && prefix <= 499) return " Japan";
      if (prefix >= 500 && prefix <= 509) return " United Kingdom";
      if (prefix >= 540 && prefix <= 549) return " /  Belgium or Luxembourg";
      if (prefix >= 570 && prefix <= 579) return " Denmark";
      if (prefix >= 600 && prefix <= 601) return " South Africa";
      if (prefix >= 690 && prefix <= 699) return " China";
      if (prefix >= 700 && prefix <= 709) return " Norway";
      if (prefix >= 730 && prefix <= 739) return " Sweden";
      if (prefix >= 760 && prefix <= 769) return " Switzerland";
      if (prefix >= 800 && prefix <= 839) return " Italy";
      if (prefix >= 840 && prefix <= 849) return " Spain";
      if (prefix >= 870 && prefix <= 879) return " Netherlands";
      if (prefix === 885) return " Thailand";
      if (prefix === 888) return " Singapore";
      if (prefix === 890) return " India";
      if (prefix >= 900 && prefix <= 919) return " Austria";
      if (prefix >= 930 && prefix <= 939) return " Australia";

      return " Unknown country or unassigned prefix";
    }

    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById("barcodeOutput").textContent = decodedText;
      document.getElementById("countryOutput").textContent = getCountryFromEAN(decodedText);
      document.getElementById("result").classList.add("active");
    }

    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      { 
        fps: 10, 
        qrbox: { width: 250, height: 150 },
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      },
      false
    );

    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
